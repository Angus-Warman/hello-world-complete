name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - ".gitignore"
      - "**.md"
      - "docs/**"
      - "LICENCE"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.relase_id.outputs.value }}
    steps:
      - name: Set release ID
        id: release_id
        run: echo "value=$(date -u +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64, ext: "" }
          - { goos: darwin, goarch: amd64, ext: "" }
          - { goos: windows, goarch: amd64, ext: ".exe" }

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          OUT: ${{ github.event.repository.name }}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}
        run: go build -trimpath -ldflags="-s -w -X main.version=${{ needs.setup.outputs.release_id }}" -o "$OUT" ./...

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}
          path: ${{ github.event.repository.name }}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist

      - name: Checksums
        run: cd dist && sha256sum * > checksums.txt

      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          tag_name: ${{ needs.setup.outputs.release_id }}